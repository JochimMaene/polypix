name: Run tests

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macosx_deployment_target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            macosx_deployment_target: ""
          - os: macos-14
            macosx_deployment_target: "11.0"

    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.70.1
          cache: false
          run-install: false

      - name: Install test environment
        env:
          PIXI_CACHE_DIR: ${{ runner.temp }}/pixi-cache
        run: pixi install --locked --environment test

      - name: Run test suite
        working-directory: ${{ runner.temp }}
        env:
          PIXI_CACHE_DIR: ${{ runner.temp }}/pixi-cache
        run: pixi run --manifest-path "$GITHUB_WORKSPACE" --environment test python -m pytest -q "$GITHUB_WORKSPACE/tests"
