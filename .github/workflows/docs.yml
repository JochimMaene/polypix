name: Publish docs

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/docs.yml"
      - "docs/**"
      - "pyproject.toml"
      - "pixi.lock"
      - "zensical.toml"
  pull_request:
    paths:
      - ".github/workflows/docs.yml"
      - "docs/**"
      - "pyproject.toml"
      - "pixi.lock"
      - "zensical.toml"

permissions:
  contents: read

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.70.1
          cache: false
          run-install: false

      - name: Install docs environment
        env:
          PIXI_CACHE_DIR: ${{ runner.temp }}/pixi-cache
        run: pixi install --locked --environment docs

      - name: Build docs
        env:
          PIXI_CACHE_DIR: ${{ runner.temp }}/pixi-cache
        run: pixi run --environment docs docs-build

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy docs
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
