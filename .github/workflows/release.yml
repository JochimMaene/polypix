name: Build and publish

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/release.yml"
      - "ci/**"
      - "CMakeLists.txt"
      - "polypix/**"
      - "pyproject.toml"
      - "src/polypix/**"
      - "tests/**"
  release:
    types: [published]

jobs:
  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build sdist
        run: pipx run build --sdist

      - name: Check metadata
        run: pipx run twine check dist/*

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: release-sdist
          path: dist/*.tar.gz
          retention-days: 30

  build_wheels:
    name: Build wheel on ${{ matrix.os }} ${{ matrix.arch }}
    if: github.event_name != 'pull_request'
    runs-on: ${{ matrix.os }}
    env:
      HEALPIX_CXX_VERSION: "3.83"
      CFITSIO_VERSION: "4.6.3"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
          - os: macos-15-intel
            arch: x86_64
            macosx_deployment_target: "11.0"
          - os: macos-14
            arch: arm64
            macosx_deployment_target: "11.0"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache native dependency prefix
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/polypix-deps
          key: polypix-deps-${{ matrix.os }}-${{ matrix.arch }}-${{ env.HEALPIX_CXX_VERSION }}-${{ env.CFITSIO_VERSION }}-${{ hashFiles('ci/install_3rdparty.sh') }}

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.0
        env:
          CIBW_ARCHS: ${{ matrix.arch }}
          CIBW_BUILD: "cp312-* cp313-* cp314-*"
          CIBW_SKIP: "*musllinux*"
          CIBW_MANYLINUX_X86_64_IMAGE: "manylinux_2_34"
          CIBW_ENVIRONMENT_LINUX:
            POLYPIX_DEPS_PREFIX='/host${{ runner.temp }}/polypix-deps/dist'
            CMAKE_PREFIX_PATH='/host${{ runner.temp }}/polypix-deps/dist'
            PKG_CONFIG_PATH='/host${{ runner.temp }}/polypix-deps/dist/lib/pkgconfig'
            PATH="/host${{ runner.temp }}/polypix-deps/dist/bin:$PATH"
            HEALPIX_CXX_VERSION='${{ env.HEALPIX_CXX_VERSION }}'
            CFITSIO_VERSION='${{ env.CFITSIO_VERSION }}'
          CIBW_ENVIRONMENT_MACOS:
            POLYPIX_DEPS_PREFIX='${{ runner.temp }}/polypix-deps/dist'
            CMAKE_PREFIX_PATH='${{ runner.temp }}/polypix-deps/dist'
            PKG_CONFIG_PATH='${{ runner.temp }}/polypix-deps/dist/lib/pkgconfig'
            PATH="${{ runner.temp }}/polypix-deps/dist/bin:$PATH"
            HEALPIX_CXX_VERSION='${{ env.HEALPIX_CXX_VERSION }}'
            CFITSIO_VERSION='${{ env.CFITSIO_VERSION }}'
            MACOSX_DEPLOYMENT_TARGET='${{ matrix.macosx_deployment_target }}'
          CIBW_BEFORE_ALL: "/bin/bash ci/install_3rdparty.sh"
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: "LD_LIBRARY_PATH='/host${{ runner.temp }}/polypix-deps/dist/lib' auditwheel repair -w {dest_dir} {wheel}"
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: "DYLD_LIBRARY_PATH='${{ runner.temp }}/polypix-deps/dist/lib' delocate-wheel --require-archs=${{ matrix.arch }} -w {dest_dir} -v {wheel}"
          CIBW_TEST_REQUIRES: "pytest"
          CIBW_TEST_COMMAND: "python -m pytest {project}/tests"

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}-${{ matrix.arch }}
          path: wheelhouse/*.whl
          retention-days: 30

  build_wheels_pr_smoke:
    name: PR wheel smoke on ${{ matrix.os }} ${{ matrix.arch }}
    if: github.event_name == 'pull_request'
    runs-on: ${{ matrix.os }}
    env:
      HEALPIX_CXX_VERSION: "3.83"
      CFITSIO_VERSION: "4.6.3"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
          - os: macos-14
            arch: arm64
            macosx_deployment_target: "11.0"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache native dependency prefix
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/polypix-deps
          key: polypix-deps-smoke-${{ matrix.os }}-${{ matrix.arch }}-${{ env.HEALPIX_CXX_VERSION }}-${{ env.CFITSIO_VERSION }}-${{ hashFiles('ci/install_3rdparty.sh') }}

      - name: Build smoke wheels
        uses: pypa/cibuildwheel@v3.4.0
        env:
          CIBW_ARCHS: ${{ matrix.arch }}
          CIBW_BUILD: "cp312-* cp314-*"
          CIBW_SKIP: "*musllinux*"
          CIBW_MANYLINUX_X86_64_IMAGE: "manylinux_2_34"
          CIBW_ENVIRONMENT_LINUX:
            POLYPIX_DEPS_PREFIX='/host${{ runner.temp }}/polypix-deps/dist'
            CMAKE_PREFIX_PATH='/host${{ runner.temp }}/polypix-deps/dist'
            PKG_CONFIG_PATH='/host${{ runner.temp }}/polypix-deps/dist/lib/pkgconfig'
            PATH="/host${{ runner.temp }}/polypix-deps/dist/bin:$PATH"
            HEALPIX_CXX_VERSION='${{ env.HEALPIX_CXX_VERSION }}'
            CFITSIO_VERSION='${{ env.CFITSIO_VERSION }}'
          CIBW_ENVIRONMENT_MACOS:
            POLYPIX_DEPS_PREFIX='${{ runner.temp }}/polypix-deps/dist'
            CMAKE_PREFIX_PATH='${{ runner.temp }}/polypix-deps/dist'
            PKG_CONFIG_PATH='${{ runner.temp }}/polypix-deps/dist/lib/pkgconfig'
            PATH="${{ runner.temp }}/polypix-deps/dist/bin:$PATH"
            HEALPIX_CXX_VERSION='${{ env.HEALPIX_CXX_VERSION }}'
            CFITSIO_VERSION='${{ env.CFITSIO_VERSION }}'
            MACOSX_DEPLOYMENT_TARGET='${{ matrix.macosx_deployment_target }}'
          CIBW_BEFORE_ALL: "/bin/bash ci/install_3rdparty.sh"
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: "LD_LIBRARY_PATH='/host${{ runner.temp }}/polypix-deps/dist/lib' auditwheel repair -w {dest_dir} {wheel}"
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: "DYLD_LIBRARY_PATH='${{ runner.temp }}/polypix-deps/dist/lib' delocate-wheel --require-archs=${{ matrix.arch }} -w {dest_dir} -v {wheel}"
          CIBW_TEST_REQUIRES: "pytest"
          CIBW_TEST_COMMAND: "python -m pytest {project}/tests"

      - name: Upload smoke wheels
        uses: actions/upload-artifact@v4
        with:
          name: smoke-${{ matrix.os }}-${{ matrix.arch }}
          path: wheelhouse/*.whl
          retention-days: 7

  upload_all:
    name: Publish to PyPI
    needs: [build_sdist, build_wheels]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
